version: '3.8'

services:
  products-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: products-api
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      DATABASE_PATH: /app/data/products.sqlite
    volumes:
      - products-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/products"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  products-data:
    driver: local
